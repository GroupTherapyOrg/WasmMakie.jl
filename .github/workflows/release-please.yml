name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/checkout@v6
        with:
          repository: MilesCranmerBot/release-please
          ref: 911ad18bdc3bb52bfef564cfbcb35f31aac01df3
          path: release-please-src

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install release-please deps
        working-directory: release-please-src
        run: npm ci

      - name: Build release-please
        working-directory: release-please-src
        run: npm run compile

      - name: Create or update release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node release-please-src/build/src/bin/release-please.js release-pr \
            --token "$GITHUB_TOKEN" \
            --repo-url "https://github.com/${{ github.repository }}" \
            --target-branch main \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node release-please-src/build/src/bin/release-please.js github-release \
            --token "$GITHUB_TOKEN" \
            --repo-url "https://github.com/${{ github.repository }}" \
            --target-branch main \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json

  # When (and only when) the release-please PR is merged, the step above tags vX.Y.Z on the release
  # commit. Detect that tag and trigger registration to the General registry — the same
  # `@JuliaRegistrator register` comment you'd post by hand. It must live in THIS workflow (not a
  # separate `on: release` one): a release created by GITHUB_TOKEN can't trigger another workflow,
  # but JuliaRegistrator is a GitHub App, so it still receives the commit-comment webhook here.
  register-general:
    name: Register new release to General
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect a freshly-created release tag on HEAD
        id: tag
        run: |
          git fetch --tags --force --quiet
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "Release tag $TAG on $GITHUB_SHA — registering to General."
          else
            echo "No release tag on HEAD (this push didn't cut a release) — nothing to register."
          fi

      - name: Trigger JuliaRegistrator on the release commit
        if: steps.tag.outputs.tag != ''
        uses: peter-evans/commit-comment@v3
        with:
          body: "@JuliaRegistrator register"
