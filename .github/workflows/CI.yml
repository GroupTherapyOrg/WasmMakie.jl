name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    # bash on every OS (Git Bash on Windows) so the `||` retry and the
    # single-quoted `julia -e` invocations behave identically everywhere.
    shell: bash
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: WasmMakie.jl

      # the test env's [sources] points at ../../WasmTarget.jl — a sibling
      # checkout of WasmTarget, exactly like local development. The Int128
      # struct-field codegen WasmMakie's E-001 wasm-acid kernel relies on lives
      # on wt-pluto-codegen-campaign and is not yet merged to WasmTarget main —
      # pin to that branch until it lands on main.
      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/WasmTarget.jl
          ref: wt-pluto-codegen-campaign
          path: WasmTarget.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      # node 24: WasmTarget modules import the `wasm:js-string` builtin, which
      # the test checkers opt into via the `{ builtins: ['js-string'] }`
      # compileOptions on WebAssembly.instantiate — supported here, matching the
      # node 24/25 used in local development.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # WasmTarget validates every emitted module through wasm-tools. Install the
      # official prebuilt binary (no source build) — fast and reliable on all
      # three OSes.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: Instantiate test environment
        working-directory: WasmMakie.jl
        run: julia --project=test -e 'import Pkg; Pkg.instantiate()'

      # C-002 runs in its own process: inside the full suite, the parent-side
      # subprocess IO trips a heap-state-dependent Julia 1.12 GC segfault
      # (deterministic on the Linux runners) — a fresh process never
      # accumulates the triggering state. See test/c002_parity.jl.
      - name: C-002 parity oracle (isolated process)
        working-directory: WasmMakie.jl
        run: julia --project=test test/c002_parity.jl

      - name: Run tests (with one flake retry)
        working-directory: WasmMakie.jl
        env:
          WASMMAKIE_SKIP_C002: '1'
        run: |
          julia --project=test test/runtests.jl || julia --project=test test/runtests.jl
